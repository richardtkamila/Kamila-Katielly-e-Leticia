<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Preço com Imposto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cálculo de Preço com Imposto</h1>

        <label for="preco">Preço do Produto (R$):</label>
        <input type="number" id="preco" placeholder="Ex: 100">

        <label for="imposto">Imposto (%):</label>
        <input type="number" id="imposto" placeholder="Ex: 18">

        <button onclick="calcularPrecoFinal()">Calcular</button>

        <p id="resultado"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
